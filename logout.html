<!DOCTYPE html>
<html>

<head>
    <title>TesNet – Logged Out</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary: #0066cc;
            --primary-dark: #0052a3;
            --accent: #28a745;
            --bg-gradient-start: #f0f4f8;
            --bg-gradient-end: #d9e2ec;
            --header-bg: #0066cc;
            --card-bg: #ffffff;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --text-color: #333333;
            --text-secondary: #666666;
            --footer-bg: #f8f9fa;
            --footer-text: #6c757d;
            --input-bg: #ffffff;
            --input-border: #ced4da;
        }

        body.dark-mode {
            --primary: #4d9eff;
            --primary-dark: #3a7bca;
            --accent: #34ce57;
            --bg-gradient-start: #1e2a3a;
            --bg-gradient-end: #0f172a;
            --header-bg: #1e2a3a;
            --card-bg: #2d3748;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --text-color: #f0f0f0;
            --text-secondary: #b0b0b0;
            --footer-bg: #1e1e2a;
            --footer-text: #9ca3af;
            --input-bg: #2d3748;
            --input-border: #4a5568;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: background 0.3s, box-shadow 0.3s;
        }

        body.dark-mode .container {
            background: #1a202c;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: var(--header-bg);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            margin-bottom: 10px;
            font-size: 2em;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            transition: background 0.3s;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 40px 30px;
            background: var(--card-bg);
            text-align: center;
        }

        .content h2 {
            color: var(--text-color);
            margin-bottom: 20px;
        }

        .content p {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .button:hover {
            background: var(--primary-dark);
        }

        .footer {
            background: var(--footer-bg);
            padding: 15px;
            text-align: center;
            color: var(--footer-text);
            font-size: 0.9em;
        }
    </style>
</head>

<body class="dark-mode">
    <div class="container">
        <div class="header">
            <h1>TesNet Hotspot</h1>
            <p>You have been logged out</p>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">☀️</button>
        </div>

        <div class="content">
            <h2>Thank you for using TesNet</h2>
            <p>You have successfully disconnected from the WiFi hotspot.<br>Your session is now ended.</p>
            <p>If you wish to connect again, please log in with your voucher code.</p>
            <a href="$(link-login)" class="button">Return to Login</a>
        </div>

        <div class="footer">
            &copy; 2026 TesNet
        </div>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.remove('dark-mode');
            themeToggle.textContent = '🌙';
        } else if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
        } else {
            themeToggle.textContent = '☀️';
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                themeToggle.textContent = '🌙';
            } else {
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                themeToggle.textContent = '☀️';
            }
        });
    </script>
</body>

</html>
